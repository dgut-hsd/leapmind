spring:
  datasource:
    url: jdbc:mysql://prod-db-host:3306/leapmind-voice?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:prod_user}
    password: ${DB_PASSWORD:prod_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# MyBatis-Plus配置 - 生产环境
mybatis-plus:
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# 日志配置 - 生产环境使用适度的日志级别
logging:
  level:
    # 生产环境使用INFO级别，减少日志量
    com.treepeople.leapmindtts: INFO
    # 文本润色服务使用WARN级别，只记录重要信息
    com.treepeople.leapmindtts.service.TextPolishingService: WARN
    # Spring框架日志保持WARN级别
    org.springframework: WARN

# ==========================================
# 生产环境下的文本润色配置
# ==========================================
# 生产环境优化配置，注重性能和稳定性
text-polishing:
  # 生产环境默认启用润色功能
  enabled: true
  
  # 生产环境使用较短的超时时间，确保响应速度
  timeout: 3
  
  # 生产环境减少重试次数，避免过多的API调用
  max-retries: 1
  
  # 生产环境使用优化的提示词，更加简洁高效
  prompt: |
    请将以下文本优化为适合教学的口语化内容，保持原意，增强表达效果，字数不超过原有文字+100字：
    
  # 生产环境的降级配置 - 确保服务稳定性
  fallback:
    enabled: true
    use-original-on-error: true
  
  # 生产环境的验证配置 - 严格控制资源使用
  validation:
    # 生产环境限制文本长度，控制API成本
    max-text-length: 300
    # 保持合理的最小长度要求
    min-text-length: 5