server:
  port: 8080
  # Tomcat服务器配置（用于处理WebSocket消息大小）
  tomcat:
    # 设置最大WebSocket消息缓冲区大小
    max-http-form-post-size: 2097152 # 2MB
    max-swallow-size: 2097152 # 2MB

spring:
  application:
    name: leapmind-tts
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: dev
  # WebSocket配置
  websocket:
    servlet-path: /speech-websocket
  mvc:
    async:
      request-timeout: 60000
  main:
    allow-circular-references: true

# 通用日志配置
