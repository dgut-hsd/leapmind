# 分段语音配置 (Segmented Speech Configuration)
segmented-speech:
  enabled: true
  text-splitting:
    sentence-separators: ["。", "！", "？", ".", "!", "?"]
    max-segment-length: 200
    min-segment-length: 5
    smart-splitting: true
  synthesis:
    max-concurrent-requests: 1
    retry-attempts: 3
    timeout: 15s
    batch-size: 3
    request-interval: 1000
  cache:
    segment-cache-size: 50
    session-timeout: 30m
    enable-preload: true
    preload-segments: 2
  memory:
    cleanup-interval: 5m
    max-memory-usage: 100MB
    auto-cleanup-enabled: true
  playback:
    enable-seek: true
    enable-pause-resume: true
    progress-update-interval: 1s

# MyBatis配置
mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true

mybatis-plus:
  global-config:
    db-config:
      id-type: auto

# 云片短信服务配置
yunpian:
  sms:
    api-key: your_yunpian_api_key_here
    url: https://sms.yunpian.com/v2/sms/single_send.json
    sign: 【云片网】 # 短信签名，请替换为你的签名
    template: 您的验证码是 {code} # 验证码模板
    connect-timeout: 10 # 连接超时时间（秒）
    read-timeout: 30 # 读取超时时间（秒）

# Eureka配置（如果需要）
eureka:
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
  server:
    enableSelfPreservation: false
    evictionIntervalTimerInMs: 60000
