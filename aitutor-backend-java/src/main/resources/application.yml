# 文本润色配置 (Text Polishing Configuration)
text-polishing:
  # 功能开关 - 是否启用文本润色功能
  enabled: true
  # API调用超时时间（秒）
  timeout: 5
  # 最大重试次数
  max-retries: 1
  # 润色提示词模板
  prompt: |
    请将以下文本润色为适合老师讲课的内容。要求：
    1. 保持原意不变，确保信息准确性
    2. 语言更加生动、易懂，适合学生理解
    3. 适合口语化表达，增强互动感
    4. 增加适当的过渡词和解释，提升连贯性
    5. 保持专业术语的准确性，必要时添加简单解释
    6. 【重要】润色后的内容字数不得超过原文字数+200字
    7. 根据页面类型（如目录、标题页等）调整讲解风格和篇幅

    重要：只返回润色后的教学内容，不要包含任何说明、引导语、分隔符或额外的话语。

    原文：

  # 降级机制配置
  fallback:
    enabled: true
    use-original-on-error: true

  # 文本验证配置
  validation:
    max-text-length: 500
    min-text-length: 5

